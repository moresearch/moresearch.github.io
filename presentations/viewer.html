<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presentation Viewer</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .pdf-container { width: 90vw; height: 90vh; box-shadow: 0 0 16px #000a; background: #222; border-radius: 8px; overflow: hidden; position: relative; }
    iframe { width: 100%; height: 100%; border: none; background: #222; }
    .fullscreen-btn {
      position: absolute; top: 12px; right: 16px; z-index: 10;
      background: #222; color: #ff9800; border: none; border-radius: 4px; padding: 8px 14px;
      font-size: 1em; cursor: pointer; opacity: 0.85; transition: opacity 0.2s;
    }
    .fullscreen-btn:hover { opacity: 1; background: #333; }
    .fallback { margin-top: 1em; color: #aaa; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="pdf-container" id="pdfContainer">
    <button class="fullscreen-btn" onclick="goFullscreen()">⛶ Fullscreen</button>
    <iframe src="001.pdf" allowfullscreen id="pdfFrame"></iframe>
  </div>
  <div class="fallback">
    If the PDF does not display, <a href="001.pdf" style="color:#ff9800;" target="_blank" rel="noopener">download it here</a>.
  </div>
  <script>
    function goFullscreen() {
      var elem = document.getElementById('pdfContainer');
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
