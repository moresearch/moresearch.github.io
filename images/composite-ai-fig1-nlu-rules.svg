<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Figure 1: Natural Language Understanding followed by Rule Reasoning</text>

  <!-- Input text box -->
  <rect x="30" y="55" width="130" height="60" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="95" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Unstructured</text>
  <text x="95" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Text Input</text>

  <!-- Arrow input → LLM -->
  <line x1="160" y1="85" x2="210" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM NLU box -->
  <rect x="215" y="50" width="150" height="70" rx="8" fill="url(#llmGrad)"/>
  <text x="290" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="white">LLM</text>
  <text x="290" y="98" text-anchor="middle" font-size="11" fill="#DBEAFE">Natural Language</text>
  <text x="290" y="113" text-anchor="middle" font-size="11" fill="#DBEAFE">Understanding</text>

  <!-- Arrow LLM → structured -->
  <line x1="365" y1="85" x2="415" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Structured data box -->
  <rect x="420" y="55" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="480" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Structured</text>
  <text x="480" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Data / JSON</text>

  <!-- Arrow structured → rule engine -->
  <line x1="540" y1="85" x2="590" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Rule Engine box -->
  <rect x="595" y="50" width="105" height="70" rx="8" fill="url(#ruleGrad)"/>
  <text x="647" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="white">Rule</text>
  <text x="647" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">Engine</text>
  <text x="647" y="112" text-anchor="middle" font-size="10" fill="#D1FAE5">(ODM/ADS)</text>

  <!-- Decision output -->
  <rect x="310" y="145" width="100" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="360" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Decision Output</text>

  <!-- Arrow from rule engine down to decision -->
  <line x1="647" y1="120" x2="647" y2="138" stroke="#374151" stroke-width="1.5"/>
  <line x1="647" y1="138" x2="410" y2="138" stroke="#374151" stroke-width="1.5"/>
  <line x1="410" y1="138" x2="410" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Annotations -->
  <text x="290" y="190" text-anchor="middle" font-size="10" fill="#6B7280">Extracts entities, intents, parameters</text>
  <text x="647" y="190" text-anchor="middle" font-size="10" fill="#6B7280">Deterministic reasoning</text>
</svg>
