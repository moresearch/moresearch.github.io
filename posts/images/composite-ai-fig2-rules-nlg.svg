<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Figure 2: Rule Reasoning followed by Natural Language Generation with LLM</text>

  <!-- Structured data input -->
  <rect x="25" y="55" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="85" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Structured</text>
  <text x="85" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Input Data</text>

  <!-- Arrow input → rule engine -->
  <line x1="145" y1="85" x2="195" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Rule Engine box -->
  <rect x="200" y="50" width="140" height="70" rx="8" fill="url(#ruleGrad)"/>
  <text x="270" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="white">Rule</text>
  <text x="270" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="white">Engine</text>
  <text x="270" y="111" text-anchor="middle" font-size="10" fill="#D1FAE5">Decision + parameters</text>

  <!-- Arrow rule engine → LLM -->
  <line x1="340" y1="85" x2="390" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="78" text-anchor="middle" font-size="9" fill="#6B7280">decision</text>

  <!-- LLM NLG box -->
  <rect x="395" y="50" width="150" height="70" rx="8" fill="url(#llmGrad)"/>
  <text x="470" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="white">LLM</text>
  <text x="470" y="98" text-anchor="middle" font-size="11" fill="#DBEAFE">Natural Language</text>
  <text x="470" y="113" text-anchor="middle" font-size="11" fill="#DBEAFE">Generation</text>

  <!-- Arrow LLM → output -->
  <line x1="545" y1="85" x2="595" y2="85" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="600" y="55" width="105" height="60" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="652" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Natural</text>
  <text x="652" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Language Output</text>

  <!-- Examples -->
  <rect x="160" y="145" width="400" height="36" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="360" y="168" text-anchor="middle" font-size="11" fill="#065F46">
    Examples: Explanation letters, decision justifications, compliance summaries, customer communications
  </text>

  <!-- Annotations -->
  <text x="270" y="198" text-anchor="middle" font-size="10" fill="#6B7280">Deterministic decision</text>
  <text x="470" y="198" text-anchor="middle" font-size="10" fill="#6B7280">Human-readable text generation</text>
</svg>
