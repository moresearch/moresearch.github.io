<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="compositeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Figure 6: Composite AI — Blending Neuronal and Symbolic Approaches</text>

  <!-- Left: Neuronal AI (LLM) -->
  <rect x="40" y="50" width="220" height="130" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="40" y="50" width="220" height="35" rx="10" fill="url(#llmGrad)"/>
  <rect x="40" y="75" width="220" height="2" fill="url(#llmGrad)"/>
  <text x="150" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="white">Neuronal AI (LLM)</text>

  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#1E40AF">Statistical pattern matching</text>
  <text x="150" y="123" text-anchor="middle" font-size="11" fill="#1E40AF">Natural language fluency</text>
  <text x="150" y="141" text-anchor="middle" font-size="11" fill="#1E40AF">Context understanding</text>
  <text x="150" y="159" text-anchor="middle" font-size="11" fill="#1E40AF">Flexible, probabilistic</text>
  <text x="150" y="177" text-anchor="middle" font-size="10" fill="#DC2626">⚠ Non-deterministic</text>

  <!-- Right: Symbolic AI (Rules) -->
  <rect x="460" y="50" width="220" height="130" rx="10" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="460" y="50" width="220" height="35" rx="10" fill="url(#ruleGrad)"/>
  <rect x="460" y="75" width="220" height="2" fill="url(#ruleGrad)"/>
  <text x="570" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="white">Symbolic AI (Rules)</text>

  <text x="570" y="105" text-anchor="middle" font-size="11" fill="#065F46">Deterministic logic</text>
  <text x="570" y="123" text-anchor="middle" font-size="11" fill="#065F46">Auditable decisions</text>
  <text x="570" y="141" text-anchor="middle" font-size="11" fill="#065F46">Explicit business ontology</text>
  <text x="570" y="159" text-anchor="middle" font-size="11" fill="#065F46">Reliable, repeatable</text>
  <text x="570" y="177" text-anchor="middle" font-size="10" fill="#DC2626">⚠ Brittle with ambiguity</text>

  <!-- Arrow from left to center -->
  <line x1="260" y1="115" x2="320" y2="115" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow from right to center -->
  <line x1="460" y1="115" x2="400" y2="115" stroke="#7C3AED" stroke-width="2"/>

  <!-- Intersection / Composite AI — center -->
  <rect x="295" y="205" width="130" height="70" rx="10" fill="url(#compositeGrad)"/>
  <text x="360" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="white">Composite AI</text>
  <text x="360" y="253" text-anchor="middle" font-size="10" fill="#DDD6FE">Best of Both</text>
  <text x="360" y="268" text-anchor="middle" font-size="10" fill="#DDD6FE">Worlds</text>

  <!-- Arrows down to composite -->
  <line x1="150" y1="180" x2="150" y2="195" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="150" y1="195" x2="360" y2="195" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="360" y1="195" x2="360" y2="205" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="570" y1="180" x2="570" y2="195" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="570" y1="195" x2="360" y2="195" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- 5 patterns label -->
  <rect x="240" y="290" width="240" height="24" rx="6" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="360" y="307" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Five Composite Patterns Spanning the Spectrum</text>
</svg>
