<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Talks Index</title>
  <!-- Favicon and manifest -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-TileImage" content="/favicon/mstile-150x150.png">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Orbitron', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
    }
    .logo-rail {
      width: 80px;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border-right: 1px solid #181818;
    }
    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
    }
    .logo {
      width: 56px;
      height: 56px;
      max-width: 100%;
      max-height: 100%;
      transform: rotate(-90deg) scale(1.15);
      filter: drop-shadow(0 0 8px #000a);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 48px 0 0 0;
    }
    h1 {
      font-family: 'Orbitron', Arial, sans-serif;
      font-size: 1.6em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 32px;
      margin-top: 0;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
      max-width: 420px;
    }
    li {
      margin: 1.2em 0;
      border-bottom: 1px solid #181818;
      padding-bottom: 0.8em;
    }
    a {
      color: #ff9800;
      text-decoration: none;
      font-size: 1.2em;
      font-family: 'IBM Plex Mono', monospace;
      transition: color 0.2s;
    }
    a:hover {
      color: #fff;
    }
    @media (max-width: 900px) {
      .logo-rail { display: none; }
      .main-content { padding: 24px 0 0 0; }
      ul { max-width: 98vw; }
    }
  </style>
</head>
<body>
  <aside class="logo-rail">
    <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home">
      <img src="/logo.png" alt="Hackspree logo" class="logo">
    </a>
  </aside>
  <main class="main-content">
    <h1>Talks</h1>
    <ul>
      <li><a href="001/">Talk 001</a></li>
    </ul>
  </main>
</body>
</html>
