<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Talks — Hackspree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root{--bg:#000}
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:"Orbitron", Arial, sans-serif}
    *{box-sizing:border-box}

    .bg{position:fixed;inset:0;background:#000;z-index:0}
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}

    .layout{width:min(1400px,100%);display:grid;grid-template-columns:minmax(220px,20%) minmax(0,1fr) minmax(200px,228px);gap:36px;align-items:start}

    .logo-side{display:flex;align-items:center;justify-content:center;padding:16px 8px;position:sticky;top:50vh;transform:translateY(-50%);align-self:start}
    .logo-rail{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .logo-link{display:flex;align-items:center;justify-content:center}
    .logo{display:block;width:auto;height:auto;max-width:156vh;max-height:117%;transform:rotate(-90deg) scale(1.15);transform-origin:center center}

    .content-side{display:flex;align-items:flex-start;justify-content:flex-start;padding:48px 48px 48px 8px;min-width:0}
    .content{width:100%;max-width:640px;margin:0}

    /* talk-card styles (minimal) */
    .talk-card{display:grid;gap:1.5rem;background:transparent}
    .talk-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .talk-card-header > div{flex:1}
    .talk-card .post-meta{margin:0;color:#9ca3af;letter-spacing:0.18em;text-transform:uppercase;font-size:0.56rem}
    .talk-card h1{font-size:clamp(1.18rem,1.7vw,1.4rem);margin:6px 0}
    .talk-card .summary{color:#bcbcbc;margin:0}

    .talk-actions{display:inline-flex;align-items:center;gap:0.5rem;flex:0 0 auto}
    .talk-actions a,.talk-actions button{width:2.5rem;height:2.5rem;display:inline-grid;place-items:center;border:1px solid rgba(255,255,255,0.12);background:transparent;color:inherit;text-decoration:none;cursor:pointer;border-radius:6px}
    .talk-actions i{font-size:16px}

    .talk-preview-frame{margin:0;width:100%;display:grid;place-items:center}
    .talk-preview-image{display:block;width:100%;max-width:100%;max-height:calc(100dvh - 14rem);object-fit:contain;border:1px solid rgba(255,255,255,0.12);background:#111}

    /* fullscreen tweaks */
    .talk-preview-frame:fullscreen{background:#000;padding:2rem}
    .talk-preview-frame:fullscreen .talk-preview-image{width:100%;height:100%;max-height:100%;object-fit:contain}

    @media (max-width:700px){
      .talk-card-header{flex-direction:column}
      .talk-actions{align-self:flex-end}
      .talk-preview-image{max-height:none}
    }

    /* minimal nav-side placeholder */
    .nav-side{display:flex;align-items:center;justify-content:center;padding:16px}
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <div class="layout">
      <aside class="logo-side">
        <div class="logo-rail">
          <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home">
            <img src="/logo.png" alt="Hackspree logo" class="logo">
          </a>
        </div>
      </aside>

      <section class="content-side">
        <div class="content">
          <div class="post-list">
            <article class="post talk-card" id="talk-001">
              <header class="talk-card-header">
                <div>
                  <p class="post-meta"><time datetime="2026-05-17" data-utc="May 17, 2026 UTC" aria-label="May 17, 2026 UTC">1779000000</time></p>
                  <h1>Talk 001 — Presentation title</h1>
                  <p class="summary">First presentation. Open, download, or view the first page fullscreen.</p>
                </div>

                <nav class="talk-actions" aria-label="Talk actions">
                  <a href="./001.pdf" target="_blank" rel="noopener" aria-label="Open PDF" title="Open PDF"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i></a>
                  <a href="./001.pdf" download aria-label="Download PDF" title="Download PDF"><i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i></a>
                  <button type="button" class="fullscreen-button" aria-label="Fullscreen preview" title="Fullscreen preview"><i class="fa-solid fa-expand" aria-hidden="true"></i></button>
                </nav>
              </header>

              <figure class="talk-preview-frame">
                <a href="./001.pdf" target="_blank" rel="noopener" aria-label="Open PDF">
                  <img class="talk-preview-image" src="./001-page-1.webp" alt="First page preview of Talk 001" loading="eager">
                </a>
              </figure>
            </article>

            <article class="post talk-card" id="talk-002">
              <header class="talk-card-header">
                <div>
                  <p class="post-meta"><time datetime="2026-05-17" data-utc="May 17, 2026 UTC" aria-label="May 17, 2026 UTC">1779000000</time></p>
                  <h1>Talk 002 — Presentation title</h1>
                  <p class="summary">Second presentation. Open, download, or view the first page fullscreen.</p>
                </div>

                <nav class="talk-actions" aria-label="Talk actions">
                  <a href="./002.pdf" target="_blank" rel="noopener" aria-label="Open PDF" title="Open PDF"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i></a>
                  <a href="./002.pdf" download aria-label="Download PDF" title="Download PDF"><i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i></a>
                  <button type="button" class="fullscreen-button" aria-label="Fullscreen preview" title="Fullscreen preview"><i class="fa-solid fa-expand" aria-hidden="true"></i></button>
                </nav>
              </header>

              <figure class="talk-preview-frame">
                <a href="./002.pdf" target="_blank" rel="noopener" aria-label="Open PDF">
                  <img class="talk-preview-image" src="./002-page-1.webp" alt="First page preview of Talk 002" loading="eager">
                </a>
              </figure>
            </article>
          </div>
        </div>
      </section>

      <aside class="nav-side" aria-label="Site navigation">
        <!-- left as homepage-like shell; kept minimal -->
      </aside>
    </div>
  </main>

  <script>
    (function(){
      function enterFullscreen(target, fallbackUrl){
        if(!target){ if(fallbackUrl) window.open(fallbackUrl, '_blank'); return; }
        var req = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
        if(req){
          try { req.call(target); }
          catch(err){ console.warn('fullscreen failed', err); if(fallbackUrl) window.open(fallbackUrl, '_blank'); }
        } else { if(fallbackUrl) window.open(fallbackUrl, '_blank'); }
      }

      document.querySelectorAll('.post.talk-card').forEach(function(card){
        var btn = card.querySelector('.fullscreen-button');
        var frame = card.querySelector('.talk-preview-frame');
        var linkEl = card.querySelector('.talk-preview-frame a');
        var linkHref = linkEl ? linkEl.href : null;
        if(btn && frame){
          btn.addEventListener('click', function(e){
            e.preventDefault();
            enterFullscreen(frame, linkHref);
          });
        }
        if(frame){
          frame.addEventListener('dblclick', function(){ enterFullscreen(frame, linkHref); });
        }
      });

      function onFsChange(){
        var el = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        document.body.classList.toggle('is-presenting', !!el);
      }
      document.addEventListener('fullscreenchange', onFsChange);
      document.addEventListener('webkitfullscreenchange', onFsChange);
      document.addEventListener('msfullscreenchange', onFsChange);
    })();
  </script>
</body>
</html>
