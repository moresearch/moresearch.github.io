<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Presentation Viewer</title>
  <!-- Favicon and manifest -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-TileImage" content="/favicon/mstile-150x150.png">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">
  <style>
    /* --- Copy all CSS from index.html up to .content-side --- */
    :root {
      --syntax-bg: #000000;
      --syntax-normal: #bcbcbc;
      --syntax-keyword: #eeeeee;
      --syntax-constant: #d0d0d0;
      --syntax-string: #8a8a8a;
      --syntax-comment: #585858;
      --syntax-number: #d0d0d0;
      --syntax-error-bg: #870000;
    }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      min-width: 100% !important;
      min-height: 100% !important;
      background: #000 !important;
      color: #fff !important;
    }
    * { box-sizing: border-box; }
    body {
      position: relative;
      overflow-x: hidden;
      font-family: "Orbitron", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }
    code, pre {
      font-family: "Sudo Var", monospace;
      font-variant-ligatures: none;
    }
    .bg {
      position: fixed; inset: 0; background: #000; z-index: 0;
    }
    .wrap {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px; box-sizing: border-box;
    }
    .layout {
      width: min(1400px, 100%);
      display: grid;
      grid-template-columns: minmax(220px, 20%) minmax(0, 1fr) minmax(200px, 228px);
      gap: 36px;
      align-items: start;
    }
    .logo-side {
      display: flex; align-items: center; justify-content: center;
      overflow: visible; padding: 16px 8px 16px 16px; box-sizing: border-box;
      position: sticky; top: 50vh; transform: translateY(-50%); align-self: start;
    }
    .logo-rail {
      width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .logo-link {
      display: flex; align-items: center; justify-content: center;
    }
    .logo {
      display: block; width: auto; height: auto; max-width: 156vh; max-height: 117%;
      transform: rotate(-90deg) scale(1.15); transform-origin: center center;
    }
    .content-side {
      display: flex; align-items: flex-start; justify-content: flex-start;
      padding: 48px 48px 48px 8px; box-sizing: border-box; min-width: 0;
      width: 100%;
    }
    .content {
      width: 100%; max-width: 640px; margin: 0;
      display: flex; flex-direction: column; align-items: center;
    }
    /* --- End copy --- */
    .pdf-container {
      width: 90vw; max-width: 900px; height: 90vh; max-height: 700px;
      box-shadow: 0 0 16px #000a; background: #222; border-radius: 8px;
      overflow: hidden; position: relative; display: flex; flex-direction: column; align-items: stretch; justify-content: center;
    }
    iframe {
      width: 100%; height: 100%; border: none; background: #222;
    }
    .fullscreen-btn {
      position: absolute; top: 12px; right: 16px; z-index: 10;
      background: #222; color: #ff9800; border: none; border-radius: 4px; padding: 8px 14px;
      font-size: 1em; cursor: pointer; opacity: 0.85; transition: opacity 0.2s;
      font-family: 'Orbitron', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .fullscreen-btn:hover { opacity: 1; background: #333; }
    .fallback {
      margin-top: 1em; color: #aaa; font-size: 0.9em; font-family: 'IBM Plex Mono', monospace;
    }
    @media (max-width: 900px) {
      .wrap { padding: 24px; }
      .layout { grid-template-columns: 1fr; width: 100%; gap: 24px; }
      .logo-side, .content-side { width: 100%; min-width: 0; justify-content: center; position: static; transform: none; }
      .logo-side { min-height: 28vh; padding: 24px 16px 8px; }
      .logo { transform: none; max-width: 252px; max-height: 206px; }
      .content-side { padding: 24px 28px 32px; }
      .content { max-width: 100%; margin-left: auto; margin-right: auto; }
    }
    .back-to-talks {
      color: #ff9800;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1em;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 24px;
      display: block;
      text-align: left;
      transition: color 0.2s;
    }
    .back-to-talks:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <div class="layout">
      <aside class="logo-side">
        <div class="logo-rail">
          <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home">
            <img src="/logo.png" alt="Hackspree logo" class="logo">
          </a>
        </div>
      </aside>
      <section class="content-side">
        <div class="content">
          <a href="/talks/" class="back-to-talks">← Talks</a>
          <div class="pdf-container" id="pdfContainer">
            <button class="fullscreen-btn" onclick="goFullscreen()">⛶ Fullscreen</button>
            <iframe src="001.pdf" allowfullscreen id="pdfFrame"></iframe>
          </div>
          <div class="fallback">
            If the PDF does not display, <a href="001.pdf" style="color:#ff9800;" target="_blank" rel="noopener">download it here</a>.
          </div>
        </div>
      </section>
      <nav class="nav-side"></nav>
    </div>
  </main>
  <script>
    function goFullscreen() {
      var elem = document.getElementById('pdfContainer');
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
