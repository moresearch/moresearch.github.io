<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">
  <title>Talks — Hackspree</title>
  <link rel="icon" href="/favicon/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root{--sidebar:220px;--gap:40px;--bg:#000}
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:"Orbitron", Arial, sans-serif}
    .talk-shell{min-height:100dvh;width:min(1440px,100%);margin:0 auto;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);gap:var(--gap);padding:32px 24px;box-sizing:border-box;align-items:center}

    /* Reuse exact homepage logo CSS (do not restyle the .logo element) */
    .logo-link{display:flex;align-items:center;justify-content:center}
    .logo{display:block;width:auto;height:auto;max-width:156vh;max-height:117%;transform:rotate(-90deg) scale(1.15);transform-origin:center center}

    /* Right: preview and actions (minimal) */
    .talk-preview{position:relative;min-width:0;display:grid;align-items:center;justify-items:center}
    .talk-actions{position:absolute;top:12px;right:12px;display:inline-flex;gap:10px;z-index:2}
    .icon-btn{width:40px;height:40px;display:inline-grid;place-items:center;border-radius:6px;border:1px solid rgba(255,255,255,0.18);color:#fff;text-decoration:none;background:rgba(0,0,0,0.5)}
    .icon-btn i{font-size:16px}

    .pdf-frame{width:100%;height:calc(100dvh - 96px);min-width:0;overflow:hidden;display:block}
    .pdf-frame iframe{display:block;width:100%;height:100%;border:1px solid rgba(255,255,255,0.16);background:#111}
    /* fullscreen presentation tweaks */
    .talk-preview:fullscreen .talk-actions,
    .talk-preview:-webkit-full-screen .talk-actions,
    .talk-preview:-ms-fullscreen .talk-actions { display: none !important; }
    .talk-preview:fullscreen .pdf-frame,
    .talk-preview:-webkit-full-screen .pdf-frame,
    .talk-preview:-ms-fullscreen .pdf-frame { width:100%; height:100%; }

    @media (max-width:900px){
      .logo{transform:none;max-width:252px;max-height:206px}
      .talk-shell{grid-template-columns:1fr;padding:20px;gap:20px}
      .talk-actions{position:static;justify-self:end}
      .preview-image{max-height:none}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>
<body>
  <main class="talk-shell">
    <aside class="talk-rail" aria-label="Hackspree logo rail">
      <div class="homepage-logo-slot">
        <!-- exact homepage logo block (anchor + img). src uses absolute root path so it resolves from /talks/ -->
        <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home" title="Hackspree">
          <img src="/logo.png" alt="Hackspree logo" class="logo">
        </a>
      </div>
    </aside>

    <section class="talk-list-section" aria-label="Talks index">
      <div class="talk-preview" role="region" aria-label="Talk 001 preview">
        <div class="talk-actions" role="toolbar" aria-label="Talk actions">
          <a id="open-btn" class="icon-btn" href="./001.pdf" target="_blank" rel="noopener noreferrer" title="Open"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i><span class="sr-only">Open</span></a>
          <a id="fullscreen-btn" class="icon-btn" href="#" title="Fullscreen"><i class="fa-solid fa-expand" aria-hidden="true"></i><span class="sr-only">Fullscreen</span></a>
          <a id="download-btn" class="icon-btn" href="./001.pdf" download title="Download"><i class="fa-solid fa-download" aria-hidden="true"></i><span class="sr-only">Download</span></a>
        </div>
        <div class="pdf-frame">
          <iframe id="pdfFrame" src="./001.pdf#page=1&view=FitH&toolbar=0" frameborder="0" aria-label="Talk preview PDF"></iframe>
        </div>
      </div>

      <div class="post-list">
        <article class="post" id="talk-001">
          <header class="post-header">
            <p class="post-meta"><time datetime="2026-05-17" data-utc="May 17, 2026 UTC" aria-label="May 17, 2026 UTC" tabindex="0">1779000000</time></p>
            <h2><a href="./001.pdf">Talk 001 — Presentation title</a></h2>
          </header>
          <div class="post-body">
            <p>First presentation. Click the title or the Open icon to view the full PDF.</p>
          </div>
        </article>
      </div>
    </section>
  </main>
<script>
  (function(){
    var current = '001';

    function setTalk(id){
      current = id;
      var frame = document.getElementById('pdfFrame');
      if(frame) frame.src = './' + id + '.pdf';
      var openBtn = document.getElementById('open-btn');
      if(openBtn) openBtn.href = './' + id + '.pdf';
      var downloadBtn = document.getElementById('download-btn');
      if(downloadBtn){ downloadBtn.href = './' + id + '.pdf'; downloadBtn.setAttribute('download',''); }
      var sels = document.querySelectorAll('.talk-select');
      sels.forEach(function(b){ b.setAttribute('aria-pressed', (b.getAttribute('data-id')===id).toString()); });
    }

    function enterFullscreen(target, fallbackUrl){
      if(!target){ if(fallbackUrl) window.open(fallbackUrl, '_blank'); return; }
      var req = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
      if(req){
        try { req.call(target); }
        catch(err){ console.warn('fullscreen failed', err); if(fallbackUrl) window.open(fallbackUrl, '_blank'); }
      } else { if(fallbackUrl) window.open(fallbackUrl, '_blank'); }
    }

    var selects = document.querySelectorAll('.talk-select');
    selects.forEach(function(btn){ btn.addEventListener('click', function(e){ e.preventDefault(); setTalk(btn.getAttribute('data-id')); }); });

    var fsBtn = document.getElementById('fullscreen-btn');
    if(fsBtn){
      fsBtn.addEventListener('click', function(e){
        e.preventDefault();
        var target = document.querySelector('.talk-preview');
        enterFullscreen(target, './' + current + '.pdf');
      });
    }

    var pdfOuter = document.querySelector('.pdf-frame');
    if(pdfOuter){
      pdfOuter.addEventListener('dblclick', function(){
        var target = document.querySelector('.talk-preview');
        enterFullscreen(target, './' + current + '.pdf');
      });
    }

    // init
    setTalk(current);

    function onFsChange(){
      var el = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
      document.body.classList.toggle('is-presenting', !!el);
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);
    document.addEventListener('msfullscreenchange', onFsChange);
  })();
</script>
</body>
</html>
