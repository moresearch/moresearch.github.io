<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Talk 001 — Hackspree</title>
  <link rel="icon" href="/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root{--sidebar:220px;--gap:40px;--bg:#000}
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:'IBM Plex Mono',monospace}
    .talk-shell{min-height:100dvh;width:min(1440px,100%);margin:0 auto;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);gap:var(--gap);padding:32px 24px;box-sizing:border-box;align-items:center}

    /* Left rail: centered logo only */
    .talk-rail{display:grid;place-items:center;min-width:0}
    .brand-link{display:inline-flex}
    .brand-logo{display:block;max-width:160px;width:100%;height:auto;object-fit:contain}

    /* Right: preview and actions */
    .talk-preview{position:relative;min-width:0;display:grid;align-items:center;justify-items:center}
    .talk-actions{position:absolute;top:12px;right:12px;display:inline-flex;gap:10px;z-index:2}
    .icon-btn{width:40px;height:40px;display:inline-grid;place-items:center;border-radius:6px;border:1px solid rgba(255,255,255,0.18);color:#fff;text-decoration:none;background:rgba(0,0,0,0.5)}
    .icon-btn i{font-size:16px}

    .preview-link{display:block;width:100%;min-width:0}
    .preview-image{display:block;width:100%;max-height:calc(100dvh - 96px);object-fit:contain;background:#111;border:1px solid rgba(255,255,255,0.16)}

    @media (max-width:800px){
      .talk-shell{grid-template-columns:1fr;padding:20px;gap:20px}
      .talk-rail{min-height:96px}
      .brand-logo{max-width:140px}
      .talk-actions{position:static;justify-self:end}
      .preview-image{max-height:none}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>
<body class="talk-page">
  <main class="talk-shell">
    <aside class="talk-rail" aria-label="Hackspree logo rail">
      <a class="brand-link" href="https://hackspree.com/" aria-label="Hackspree home" title="Hackspree">
        <img class="brand-logo" src="https://hackspree.com/logo.png" alt="Hackspree">
      </a>
    </aside>

    <section class="talk-preview" aria-label="Talk 001 preview">
      <nav class="talk-actions" aria-label="Talk actions">
        <a class="icon-btn" href="/talks/" aria-label="Back to talks" title="Back to talks"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i></a>
        <a class="icon-btn" href="001.pdf" aria-label="Open PDF" title="Open PDF"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i></a>
        <a class="icon-btn" href="001.pdf" download aria-label="Download PDF" title="Download PDF"><i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i></a>
      </nav>

      <a class="preview-link" href="001.pdf" aria-label="Open Talk 001 PDF">
        <img class="preview-image" src="001-page-1.png" alt="First page of Talk 001">
      </a>
    </section>
  </main>
</body>
</html>
