<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Talk 001 — Hackspree</title>
  <link rel="icon" href="/favicon/favicon.ico" />
  <style>
    :root{--header-h:88px;color-scheme:dark}
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:'IBM Plex Mono',monospace}
    .talk-shell{width:min(1500px,100%);margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;gap:20px;padding:24px;box-sizing:border-box}

    /* header masthead */
    .talk-header{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;height:var(--header-h);padding:8px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .brand-link{display:inline-flex;align-items:center}
    .brand-logo{display:block;height:72px;width:auto;object-fit:contain;transform:rotate(-90deg) scale(1.05);transform-origin:center center}

    .talk-title p{margin:0;font-size:0.9rem;color:#ff9800;letter-spacing:0.08em;text-transform:uppercase}
    .talk-title h1{margin:4px 0 0 0;font-family:'Orbitron',sans-serif;font-size:1.1rem}

    .talk-actions{display:flex;gap:12px;align-items:center}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#fff;padding:8px 10px;border-radius:6px;text-decoration:none;font-family:inherit;cursor:pointer}

    /* viewer area */
    .talk-viewer{min-width:0;height:calc(100dvh - var(--header-h) - 48px);background:#111;border-radius:6px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6)}
    .talk-viewer iframe{display:block;width:100%;height:100%;border:0;background:#111}

    @media (max-width:900px){
      .talk-shell{padding:16px}
      .talk-header{grid-template-columns:auto 1fr;gap:12px;height:auto;align-items:center}
      .brand-logo{transform:none;height:56px}
      .talk-viewer{height:75dvh}
      .talk-title h1{font-size:1rem}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>
<body class="talk-page">
  <main class="talk-shell">
    <header class="talk-header">
      <a class="brand-link" href="https://hackspree.com/" aria-label="Hackspree home">
        <img class="brand-logo" src="https://hackspree.com/logo.png" alt="Hackspree" />
      </a>

      <div class="talk-title">
        <p>Talk 001</p>
        <h1>Presentation title</h1>
      </div>

      <nav class="talk-actions" aria-label="Talk actions">
        <a class="btn" href="/talks/">Back</a>
        <a class="btn" href="001.pdf" download>Download</a>
        <button id="fullscreen-button" class="btn" type="button" onclick="goFullscreen()">Fullscreen</button>
      </nav>
    </header>

    <section class="talk-viewer" aria-label="Presentation PDF">
      <iframe id="pdfFrame" src="001.pdf#page=1&view=FitH&toolbar=0" title="Talk 001 PDF" loading="lazy"></iframe>
    </section>
  </main>

  <script>
    function goFullscreen(){
      var el = document.querySelector('.talk-viewer');
      if(!el) return;
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.msRequestFullscreen) el.msRequestFullscreen();
    }
  </script>
</body>
</html>
