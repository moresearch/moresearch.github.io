<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Talks — Hackspree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root{--bg:#000}
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:"Orbitron", Arial, sans-serif}
    *{box-sizing:border-box}

    .bg{position:fixed;inset:0;background:#000;z-index:0}
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}

    .layout{width:min(1400px,100%);display:grid;grid-template-columns:minmax(220px,20%) minmax(0,1fr) minmax(200px,228px);gap:36px;align-items:start}

    .logo-side{display:flex;align-items:center;justify-content:center;padding:16px 8px;position:sticky;top:50vh;transform:translateY(-50%);align-self:start}
    .logo-rail{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .logo-link{display:flex;align-items:center;justify-content:center}
    .logo{display:block;width:auto;height:auto;max-width:156vh;max-height:117%;transform:rotate(-90deg) scale(1.15);transform-origin:center center}

    .content-side{display:flex;align-items:flex-start;justify-content:flex-start;padding:48px 48px 48px 8px;min-width:0}
    .content{width:100%;max-width:840px;margin:0}

    /* talk-card styles (minimal) */
    .talk-card{display:grid;gap:1.5rem;background:transparent;border-bottom:1px solid rgba(255,255,255,0.03);padding:28px 0}
    .talk-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .talk-card-header > div{flex:1}
    .post-meta{margin:0;color:#9ca3af;letter-spacing:0.18em;text-transform:uppercase;font-size:0.6rem}
    .talk-card h2{font-size:clamp(1rem,1.5vw,1.25rem);margin:6px 0}

    .talk-actions{display:inline-flex;align-items:center;gap:0.5rem;flex:0 0 auto}
    .talk-actions a,.talk-actions button{width:2.5rem;height:2.5rem;display:inline-grid;place-items:center;border:1px solid rgba(255,255,255,0.12);background:transparent;color:inherit;text-decoration:none;cursor:pointer;border-radius:6px}
    .talk-actions i{font-size:16px}

    .talk-preview-image{display:block;width:100%;max-width:100%;max-height:calc(70dvh);object-fit:contain;border:1px solid rgba(255,255,255,0.12);background:#111;margin-top:12px}

    /* fullscreen viewer overlay */
    #presentation-viewer{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#000;z-index:9999}
    #presentation-viewer.active{display:grid}
    #presentation-slide{max-width:100%;max-height:100%;object-fit:contain;border:0}

    @media (max-width:700px){
      .talk-card-header{flex-direction:column}
      .talk-actions{align-self:flex-end}
      .talk-preview-image{max-height:none}
    }

    .nav-side{display:flex;align-items:center;justify-content:center;padding:16px}
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <div class="layout">
      <aside class="logo-side">
        <div class="logo-rail">
          <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home">
            <img src="/logo.png" alt="Hackspree logo" class="logo">
          </a>
        </div>
      </aside>

      <section class="content-side">
        <div class="content">
          <div id="post-list" class="post-list">
            <!-- generated talk cards will be inserted here -->
          </div>
        </div>
      </section>

      <aside class="nav-side" aria-label="Site navigation">
        <!-- kept minimal to match homepage shell -->
      </aside>
    </div>
  </main>

  <div id="presentation-viewer" aria-hidden="true">
    <img id="presentation-slide" alt="presentation slide">
  </div>

  <script>
    (async function(){
      const postsContainer = document.getElementById('post-list');
      let talks = [];
      try{
        const res = await fetch('./index.json');
        if(res.ok) talks = await res.json();
      }catch(e){ /* ignore */ }

      function fmtDate(dstr){
        try{
          const d = new Date(dstr);
          return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
        }catch(e){ return dstr || ''; }
      }

      if(!talks || talks.length === 0){
        // fallback: detect 001/002/003 by scanning known files
        const candidates = ['001','002','003'];
        talks = candidates.map(id=>({id:id,title:'Talk '+id,date:'',page_count:1})).filter(t=>{ try{ return fetch('./'+t.id+'.pdf',{method:'HEAD'}).then(r=>r.ok); }catch(e){return false}});
      }

      // If talks is an object map, ensure it's an array
      if(!Array.isArray(talks)) talks = [];

      talks.forEach(meta => {
        const id = meta.id;
        const article = document.createElement('article');
        article.className = 'post talk-card';
        article.dataset.talkId = id;

        const header = document.createElement('header');
        header.className = 'talk-card-header';

        const left = document.createElement('div');
        const time = document.createElement('time');
        time.className = 'post-meta';
        time.dateTime = meta.date || '';
        time.textContent = meta.date ? fmtDate(meta.date) : '';
        const h2 = document.createElement('h2');
        h2.textContent = meta.title || ('Talk ' + id);
        left.appendChild(time);
        left.appendChild(h2);

        const nav = document.createElement('nav');
        nav.className = 'talk-actions';
        nav.setAttribute('aria-label', (meta.title || ('Talk '+id)) + ' actions');

        const aOpen = document.createElement('a');
        aOpen.href = './' + id + '.pdf';
        aOpen.target = '_blank';
        aOpen.rel = 'noopener';
        aOpen.setAttribute('aria-label','Open PDF');
        aOpen.title = 'Open PDF';
        aOpen.innerHTML = '<i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i>';

        const aDl = document.createElement('a');
        aDl.href = './' + id + '.pdf';
        aDl.download = '';
        aDl.setAttribute('aria-label','Download PDF');
        aDl.title = 'Download PDF';
        aDl.innerHTML = '<i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'presentation-button';
        btn.setAttribute('aria-label','Fullscreen presentation');
        btn.title = 'Fullscreen presentation';
        btn.dataset.talkId = id;
        btn.dataset.pageCount = meta.page_count || 1;
        btn.innerHTML = '<i class="fa-solid fa-expand" aria-hidden="true"></i>';

        nav.appendChild(aOpen);
        nav.appendChild(aDl);
        nav.appendChild(btn);

        header.appendChild(left);
        header.appendChild(nav);

        const img = document.createElement('img');
        img.className = 'talk-preview-image';
        img.src = './' + id + '-page-1.webp';
        img.alt = (meta.title || ('Talk ' + id)) + ' first page preview';
        img.loading = 'lazy';

        article.appendChild(header);
        article.appendChild(img);
        postsContainer.appendChild(article);
      });

      // fullscreen viewer logic
      const viewer = document.getElementById('presentation-viewer');
      const slide = document.getElementById('presentation-slide');
      let active = { id: null, page: 1, pageCount: 1 };

      function showSlide(id,page){ slide.src = `./${id}-page-${page}.webp`; slide.alt = `${id} — slide ${page}`; }

      function openViewer(id,pageCount){
        active.id = id; active.page = 1; active.pageCount = pageCount || 1;
        showSlide(active.id, active.page);
        viewer.classList.add('active');
        viewer.removeAttribute('aria-hidden');
        const req = viewer.requestFullscreen || viewer.webkitRequestFullscreen || viewer.msRequestFullscreen;
        if(req) req.call(viewer).catch(()=>{});
        document.addEventListener('keydown', onKey);
        document.addEventListener('fullscreenchange', onFsChange);
      }

      function hideViewer(){
        viewer.classList.remove('active');
        viewer.setAttribute('aria-hidden','true');
        slide.src = '';
        document.removeEventListener('keydown', onKey);
        document.removeEventListener('fullscreenchange', onFsChange);
        active.id = null;
      }

      function onKey(e){
        if(!active.id) return;
        if(e.key === 'ArrowRight' || e.key === ' '){ e.preventDefault(); if(active.page < active.pageCount){ active.page++; showSlide(active.id, active.page); } }
        else if(e.key === 'ArrowLeft'){ e.preventDefault(); if(active.page > 1){ active.page--; showSlide(active.id, active.page); } }
        else if(e.key === 'Escape'){ if(document.fullscreenElement) document.exitFullscreen(); hideViewer(); }
      }

      function onFsChange(){ if(!document.fullscreenElement){ hideViewer(); } }

      document.querySelectorAll('.presentation-button').forEach(btn => {
        btn.addEventListener('click', e => { e.preventDefault(); const id = btn.dataset.talkId; const pc = parseInt(btn.dataset.pageCount||'1',10); openViewer(id,pc); });
      });

      viewer.onclick = function(){ if(!document.fullscreenElement) hideViewer(); };

    })();
  </script>
</body>
</html>
