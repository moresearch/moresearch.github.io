<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Presentation Viewer</title>
  <!-- Favicon and manifest -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48x48.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-TileImage" content="/favicon/mstile-150x150.png">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/sudo-var" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Orbitron', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
    }
    .logo-rail {
      width: 80px;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border-right: 1px solid #181818;
    }
    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
    }
    .logo {
      width: 56px;
      height: 56px;
      max-width: 100%;
      max-height: 100%;
      transform: rotate(-90deg) scale(1.15);
      filter: drop-shadow(0 0 8px #000a);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .pdf-container {
      width: 90vw;
      max-width: 900px;
      height: 90vh;
      max-height: 700px;
      box-shadow: 0 0 16px #000a;
      background: #222;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #222;
    }
    .fullscreen-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 10;
      background: #222;
      color: #ff9800;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 1em;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s;
      font-family: 'Orbitron', Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .fullscreen-btn:hover { opacity: 1; background: #333; }
    .fallback {
      margin-top: 1em;
      color: #aaa;
      font-size: 0.9em;
      font-family: 'IBM Plex Mono', monospace;
    }
    @media (max-width: 900px) {
      .logo-rail { display: none; }
      .main-content { padding: 0; }
      .pdf-container { width: 98vw; height: 80vh; max-width: 100vw; max-height: 90vh; }
    }
  </style>
</head>
<body>
  <aside class="logo-rail">
    <a class="logo-link" href="https://hackspree.com/" aria-label="Hackspree home">
      <img src="/logo.png" alt="Hackspree logo" class="logo">
    </a>
  </aside>
  <main class="main-content">
    <div class="pdf-container" id="pdfContainer">
      <button class="fullscreen-btn" onclick="goFullscreen()">⛶ Fullscreen</button>
      <iframe src="001.pdf" allowfullscreen id="pdfFrame"></iframe>
    </div>
    <div class="fallback">
      If the PDF does not display, <a href="001.pdf" style="color:#ff9800;" target="_blank" rel="noopener">download it here</a>.
    </div>
  </main>
  <script>
    function goFullscreen() {
      var elem = document.getElementById('pdfContainer');
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>
